  <!-- FONT -->

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: white;
      overflow: hidden;
    }

    /* ✨ SPARKLES */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;

      background-image:
        radial-gradient(3px 3px at 20% 30%, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 70% 60%, rgba(255,255,255,0.7), transparent),
        radial-gradient(3px 3px at 40% 80%, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.8), transparent);

      animation: sparkleMove 8s linear infinite;
    }

    @keyframes sparkleMove {
      from { transform: translateY(0); }
      to { transform: translateY(-100px); }
    }

    /* 💖 CARD */
    .container {
      position: relative;
      z-index: 1;

      padding: 60px;
      border-radius: 25px;
      text-align: center;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);

      width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 25px;
    }

    button {
      background: #ff3e6c;
      border: none;
      padding: 15px 30px;
      border-radius: 999px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      background: #ff5c83;
    }

    #result {
      margin-top: 30px;
      font-size: 22px;
      font-weight: 600;
      min-height: 40px;
      transition: 0.3s;
    }
  </style>
</head>
